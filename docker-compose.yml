services:
  flowbridge:
    build: .
    image: flowbridge:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      # PORT no .env controla só a porta publicada no HOST (${PORT:-3001} abaixo) — o app
      # sempre escuta na 3000 *dentro* do container. Sem isso, o PORT do .env vaza pro
      # processo (env_file) e ele passa a escutar numa porta diferente da que o mapeamento
      # "${PORT}:3000" espera, quebrando o acesso externo.
      PORT: "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
